# provenance.schema.yaml — 共通断片 · schema-pack v1
$schema: https://json-schema.org/draft/2020-12/schema
$schema_name: provenance
x_ihl_schema_version: 1
title: Provenance
type: object
required:
  - run_id
  - schema_version
  - input_hash
  - created_at
properties:
  run_id:
    type: string
  schema_version:
    type: integer
    minimum: 1
  input_hash:
    type: string
  created_at:
    type: string
    format: date-time
  model_name:
    type: string
  model_version:
    type: string
  pipeline_name:
    type: string
  pipeline_version:
    type: string
additionalProperties: false
