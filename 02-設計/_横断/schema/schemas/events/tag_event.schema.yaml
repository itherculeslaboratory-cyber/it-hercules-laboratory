# tag_event.schema.yaml — タグ append-only Truth · Phase 1
$schema: https://json-schema.org/draft/2020-12/schema
$schema_name: tag_event
x_ihl_schema_version: 1
x_ihl_layer: truth
title: Tag Event
type: object
required:
  - tag_event_id
  - target_type
  - target_id
  - tag
  - tag_type
  - action
  - source_type
  - created_at
  - schema_version
properties:
  tag_event_id:
    type: string
  target_type:
    type: string
    enum: [capture, individual, cross, measurement]
  target_id:
    type: string
  tag:
    type: string
  tag_type:
    type: string
    enum_ref: dictionaries/tag_type.yaml
  action:
    type: string
    enum_ref: dictionaries/tag_action.yaml
  source_type:
    type: string
    enum_ref: dictionaries/source_type.yaml
  source_id:
    type: string
  confidence:
    type: number
    minimum: 0
    maximum: 1
  reason:
    type: string
  evidence_ref:
    type: string
  model_name:
    type: string
  model_version:
    type: string
  run_id:
    type: string
  created_at:
    type: string
    format: date-time
  schema_version:
    type: integer
    minimum: 1
additionalProperties: false
