# offspring_assignment.schema.yaml — 子割当 Truth · ADR-offspring-assignment-adoption
$schema: https://json-schema.org/draft/2020-12/schema
$schema_name: offspring_assignment
x_ihl_schema_version: 1
x_ihl_layer: truth
title: Offspring Assignment
type: object
required:
  - assignment_id
  - cross_id
  - child_individual_id
  - confidence
  - created_at
  - schema_version
properties:
  assignment_id:
    type: string
  cross_id:
    type: string
  child_individual_id:
    type: string
  confidence:
    type: number
    minimum: 0
    maximum: 1
  value_origin:
    type: string
    enum_ref: dictionaries/value_origin.yaml
  assignment_reason:
    type: string
  superseded_by:
    type: string
  actor_id:
    type: string
  source_type:
    type: string
    enum_ref: dictionaries/source_type.yaml
  created_at:
    type: string
    format: date-time
  schema_version:
    type: integer
    minimum: 1
additionalProperties: false
