# embedding_locator.schema.yaml — 類似検索 locator · Phase 1
$schema: https://json-schema.org/draft/2020-12/schema
$schema_name: embedding_locator
x_ihl_schema_version: 1
x_ihl_layer: snapshot
title: Embedding Locator
type: object
required:
  - capture_id
  - individual_id
  - image_id
  - embedding_id
  - embedding_dim
  - embedding_file
  - vector_offset
  - normalized_flag
  - schema_version
  - run_id
  - created_at
properties:
  capture_id:
    type: string
  individual_id:
    type: string
  image_id:
    type: string
  part_type:
    type: string
  embedding_id:
    type: string
  embedding_model:
    type: string
  embedding_version:
    type: string
  embedding_dim:
    type: integer
  embedding_file:
    type: string
  vector_offset:
    type: integer
  normalized_flag:
    type: boolean
  adopted_flag:
    type: boolean
  snapshot_id:
    type: string
  source_run_id:
    type: string
  schema_version:
    type: integer
    minimum: 1
  run_id:
    type: string
  created_at:
    type: string
    format: date-time
additionalProperties: false
