# IHL FastAPI — api.it-hercules.uk (ver3)
# Install: /etc/nginx/conf.d/ihl-api.conf
# After Express cutover: proxy_pass 3001 → 8000
#
# TLS: certbot --nginx -d api.it-hercules.uk (or Cloudflare origin cert)

server {
    listen 80;
    server_name api.it-hercules.uk;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
