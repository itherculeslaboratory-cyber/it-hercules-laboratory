# IHL FastAPI — api.it-hercules.uk (ver3)
# Install: /etc/nginx/conf.d/ihl-api.conf
# After Express cutover: proxy_pass 3001 → 8000
#
# TLS: certbot --nginx -d api.it-hercules.uk (or Cloudflare origin cert)
#
# solid-observation/commit embeds photo_data_url (base64). Default 1m body limit
# returns nginx 413 without FastAPI CORS — browser reports a CORS error.

map $http_origin $ihl_cors_origin {
    default "";
    "~^https://it-hercules\.uk$"       $http_origin;
    "~^https://www\.it-hercules\.uk$"  $http_origin;
    "~^http://localhost:3000$"         $http_origin;
    "~^http://127.0.0.1:3000$"         $http_origin;
}

server {
    listen 80;
    server_name api.it-hercules.uk;

    # Photo commit JSON can exceed 1m; templates POST stays small.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
    }

    # nginx-generated errors never reach FastAPI — add CORS so DevTools shows real status.
    error_page 413 = @ihl_cors_413;
    error_page 502 503 504 = @ihl_cors_upstream;

    location @ihl_cors_413 {
        internal;
        default_type application/json;
        add_header Access-Control-Allow-Origin $ihl_cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Vary Origin always;
        return 413 '{"detail":"REQUEST_ENTITY_TOO_LARGE"}';
    }

    location @ihl_cors_upstream {
        internal;
        default_type application/json;
        add_header Access-Control-Allow-Origin $ihl_cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Vary Origin always;
        return 502 '{"detail":"UPSTREAM_UNAVAILABLE"}';
    }
}
