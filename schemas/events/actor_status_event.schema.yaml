# actor_status_event.schema.yaml — アクター状態変化 Truth · ADR-H-05
$schema: https://json-schema.org/draft/2020-12/schema
$schema_name: actor_status_event
x_ihl_schema_version: 1
x_ihl_layer: truth
title: Actor Status Event
type: object
required:
  - actor_status_event_id
  - actor_id
  - new_status
  - event_at
  - created_at
  - schema_version
properties:
  actor_status_event_id:
    type: string
  actor_id:
    type: string
  new_status:
    type: string
    enum: [active, suspended, banned, reviewer, admin]
  event_at:
    type: string
    format: date-time
  event_reason:
    type: string
  source_type:
    type: string
    enum_ref: dictionaries/source_type.yaml
  created_at:
    type: string
    format: date-time
  schema_version:
    type: integer
    minimum: 1
additionalProperties: false
