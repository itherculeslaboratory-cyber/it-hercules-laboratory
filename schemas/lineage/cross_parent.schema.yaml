# cross_parent.schema.yaml — 親参加 Truth · ADR-H-11
$schema: https://json-schema.org/draft/2020-12/schema
$schema_name: cross_parent
x_ihl_schema_version: 1
x_ihl_layer: truth
title: Cross Parent
type: object
required:
  - cross_parent_id
  - cross_id
  - parent_role
  - individual_id
  - created_at
  - schema_version
properties:
  cross_parent_id:
    type: string
  cross_id:
    type: string
  parent_role:
    type: string
    enum_ref: dictionaries/parent_role.yaml
    x_enum_strict: false
  individual_id:
    type: string
  parentage_confidence:
    type: number
    minimum: 0
    maximum: 1
  parentage_value_origin:
    type: string
    enum_ref: dictionaries/value_origin.yaml
  actor_id:
    type: string
  created_at:
    type: string
    format: date-time
  schema_version:
    type: integer
    minimum: 1
additionalProperties: false
