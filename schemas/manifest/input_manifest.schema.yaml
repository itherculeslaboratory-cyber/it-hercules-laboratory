# input_manifest.schema.yaml — component IN 契約 · Phase 1
$schema: https://json-schema.org/draft/2020-12/schema
$schema_name: input_manifest
x_ihl_schema_version: 1
x_ihl_layer: manifest
title: Input Manifest
type: object
required:
  - capture_id
  - input_path
  - input_type
  - schema_version
  - input_hash
properties:
  capture_id:
    type: string
  individual_id:
    type: string
  input_path:
    type: string
  input_type:
    type: string
    enum: [image, parquet, jsonl, metadata]
  species:
    type: string
  view_type:
    type: string
    enum_ref: dictionaries/view_type.yaml
  stage_name:
    type: string
    enum_ref: dictionaries/stage_name.yaml
  schema_version:
    type: integer
    minimum: 1
  input_hash:
    type: string
additionalProperties: false
