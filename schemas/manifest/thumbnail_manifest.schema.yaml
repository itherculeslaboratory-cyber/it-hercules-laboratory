# thumbnail_manifest.schema.yaml — サムネイル manifest · Phase 1
$schema: https://json-schema.org/draft/2020-12/schema
$schema_name: thumbnail_manifest
x_ihl_schema_version: 1
x_ihl_layer: truth
title: Thumbnail Manifest
type: object
required:
  - thumbnail_id
  - capture_id
  - image_id
  - individual_id
  - thumbnail_path
  - width_px
  - height_px
  - format
  - schema_version
  - run_id
  - created_at
properties:
  thumbnail_id:
    type: string
  capture_id:
    type: string
  image_id:
    type: string
  individual_id:
    type: string
  thumbnail_path:
    type: string
  width_px:
    type: integer
  height_px:
    type: integer
  format:
    type: string
  source_image_path:
    type: string
  input_hash:
    type: string
  thumbnail_version:
    type: integer
  pipeline_name:
    type: string
  pipeline_version:
    type: string
  schema_version:
    type: integer
    minimum: 1
  run_id:
    type: string
  created_at:
    type: string
    format: date-time
additionalProperties: false
