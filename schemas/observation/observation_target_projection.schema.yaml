# observation_target_projection.schema.yaml — 観測対象 projection · Wave B
$schema: https://json-schema.org/draft/2020-12/schema
$schema_name: observation_target_projection
x_ihl_schema_version: 1
x_ihl_layer: snapshot
title: Observation Target Projection
type: object
required:
  - owner_user_id
  - target_id
  - domain
  - path
  - rank
  - display_name
  - selected_event_id
  - selected_at
  - schema_version
properties:
  owner_user_id:
    type: string
  target_id:
    type: string
  domain:
    type: string
    enum_ref: dictionaries/observation_target_domain.yaml
  path:
    type: array
    minItems: 1
    items:
      type: string
  rank:
    type: string
    enum: [domain, kingdom, phylum, class, order, family, genus, species, subspecies, custom]
  display_name:
    type: string
  canonical_ids:
    type: object
    properties:
      gbif_taxon_key:
        type: string
      wikidata_qid:
        type: string
    additionalProperties: false
  structured_tags:
    type: array
    items:
      type: string
  selected_event_id:
    type: string
  selected_at:
    type: string
    format: date-time
  source_event_max_created_at:
    type: string
    format: date-time
  schema_version:
    type: integer
    minimum: 1
additionalProperties: false
